spring.application.name=Books-Ordering-System

# MySQL Database Connection
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/books_ordering_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei&characterEncoding=utf8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring AI + Ollama
spring.ai.model.chat=ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_CHAT_MODEL:qwen3.5:9b}
spring.ai.ollama.chat.temperature=${OLLAMA_TEMPERATURE:0.2}
spring.ai.ollama.chat.num-ctx=${OLLAMA_NUM_CTX:4096}
spring.ai.ollama.chat.num-predict=${OLLAMA_NUM_PREDICT:512}
spring.ai.ollama.chat.think=false
spring.ai.ollama.chat.keep_alive=10m
spring.ai.ollama.init.pull-model-strategy=never

# Avoid lazy-loading queries from view layer
spring.jpa.open-in-view=false

# Server
server.port=8080